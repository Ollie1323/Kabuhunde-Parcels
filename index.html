<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kabuhunde Cadastral Map – Gasabo District</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --panel:     #181c27;
      --border:    #2a2f42;
      --accent:    #4fc3f7;
      --text:      #e8eaf0;
      --muted:     #7b82a0;
      --res:       #c0714b;
      --agri:      #5a9e5a;
      --comm:      #d94f4f;
      --open:      #7b9ec0;
      --unknown:   #888;
    }

    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }

    #app { display: flex; flex-direction: column; height: 100vh; }

    #header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex; align-items: center; gap: 16px;
      flex-shrink: 0;
      z-index: 1000;
    }

    #header .badge {
      background: var(--accent);
      color: #0f1117;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 3px;
    }

    #header h1 {
      font-family: 'Space Mono', monospace;
      font-size: 14px;
    }

    #map-wrap { flex: 1; position: relative; overflow: hidden; }
    #map { height: 100%; width: 100%; }

    #sidebar {
      position: absolute;
      top: 12px; right: 12px;
      width: 240px;
      background: rgba(24, 28, 39, 0.94);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      z-index: 500;
    }

    .legend-item { display:flex; gap:10px; padding:6px 0; cursor:pointer; }
    .swatch { width:18px; height:18px; border-radius:3px; }

    #filter-bar {
      position: absolute;
      bottom: 12px; left: 12px;
      display: flex; gap: 6px;
    }

    .filter-btn {
      background: rgba(24, 28, 39, 0.92);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 10px;
      padding: 6px 12px;
      cursor: pointer;
    }

    #loading {
      position: absolute; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
    }
  </style>
</head>

<body>
<div id="app">

  <div id="header">
    <span class="badge">SGE4165</span>
    <h1>Kabuhunde Cadastral Parcels — Gasabo District</h1>
  </div>

  <div id="map-wrap">
    <div id="loading"><p>Loading...</p></div>
    <div id="map"></div>

    <div id="sidebar">
      <h2>Land Use Legend</h2>

      <div class="legend-item" onclick="filterByLU('Residential')">
        <div class="swatch" style="background:#c0714b"></div> Residential
      </div>

      <div class="legend-item" onclick="filterByLU('Agriculture')">
        <div class="swatch" style="background:#5a9e5a"></div> Agriculture
      </div>

      <div class="legend-item" onclick="filterByLU('Commercial')">
        <div class="swatch" style="background:#d94f4f"></div> Commercial
      </div>

      <div class="legend-item" onclick="filterByLU('Open Space')">
        <div class="swatch" style="background:#7b9ec0"></div> Open Space
      </div>
    </div>

    <div id="filter-bar">
      <button onclick="showAll()">All</button>
      <button onclick="filterByLU('Residential')">Residential</button>
      <button onclick="filterByLU('Agriculture')">Agriculture</button>
      <button onclick="filterByLU('Commercial')">Commercial</button>
      <button onclick="filterByLU('Open Space')">Open</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script>
const map = L.map('map').setView([-1.9210, 30.0827], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 20
}).addTo(map);

function getLandUseColor(lu) {
  switch ((lu || '').trim()) {
    case 'Residential': return '#c0714b';
    case 'Agriculture': return '#5a9e5a';
    case 'Commercial': return '#d94f4f';
    case 'Open Space': return '#7b9ec0';
    default: return '#888';
  }
}

let geojsonLayer;
let activeFilter = null;

function style(feature) {
  return {
    fillColor: getLandUseColor(feature.properties.Land_Use),
    fillOpacity: 0.6,
    color: '#111',
    weight: 0.5
  };
}

function build(data) {
  geojsonLayer = L.geoJSON(data, {
    style: style
  }).addTo(map);

  map.fitBounds(geojsonLayer.getBounds());
  document.getElementById('loading').style.display = 'none';
}

function filterByLU(lu) {
  activeFilter = lu;

  geojsonLayer.eachLayer(layer => {
    const v = layer.feature.properties.Land_Use;
    layer.setStyle({
      fillColor: getLandUseColor(v),
      fillOpacity: v === lu ? 0.9 : 0.1
    });
  });
}

function showAll() {
  activeFilter = null;
  geojsonLayer.resetStyle();
}

/* ✅ ONLY FIXED LINE BELOW */
fetch('./Kabuhunde_Simp_FeaturesToJSO.geojson')
  .then(r => r.json())
  .then(build)
  .catch(err => {
    console.error(err);
    document.getElementById('loading').innerHTML = "Failed to load GeoJSON";
  });

</script>
</body>
</html>
